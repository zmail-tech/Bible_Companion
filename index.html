<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bible Companion - A lightweight Bible reader with AI commentary">
  <meta name="theme-color" content="#1a1a2e">
  <title>Bible Companion</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1>Bible Companion</h1>
      <div class="header-controls">
        <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <main id="main-content">
      <section id="bible-reader">
        <nav id="navigation-bar">
          <div class="nav-group">
            <label for="book-select">Book</label>
            <select id="book-select"></select>
          </div>
          <div class="nav-group">
            <label for="chapter-select">Chapter</label>
            <select id="chapter-select"></select>
          </div>
          <div class="nav-actions">
            <button id="send-to-ai" class="btn-primary" disabled title="Send selected verses to AI (Ctrl+Enter)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21 15-3-3v-4a1 1 0 0 0-1-1h-7.086a1 1 0 0 0-.707.293L4.675 10.293A1 1 0 0 0 4 11v7a1 1 0 0 0 1 1h5"></path>
                <circle cx="12" cy="7" r="1"></circle>
              </svg>
              Send to AI
            </button>
          </div>
        </nav>
        <div id="verse-container"></div>
      </section>

      <section id="ai-panel">
        <div id="ai-header">
          <h2>AI Commentary</h2>
          <span id="ai-status"></span>
        </div>
        <div id="ai-response"></div>
      </section>
    </main>
  </div>

  <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="settings-title">Settings</h2>
        <button id="close-settings" class="icon-btn" aria-label="Close settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <form id="settings-form">
        <div class="form-group">
          <label for="endpoint-url">Endpoint URL</label>
          <input type="url" id="endpoint-url" placeholder="https://api.openai.com/v1/chat/completions" required>
          <small class="form-hint">OpenAI-compatible /.chat/completions endpoint</small>
        </div>
        <div class="form-group">
          <label for="api-key">API Key</label>
          <input type="password" id="api-key" placeholder="sk-...">
          <small class="form-hint">Optional. Leave blank if your endpoint doesn't require authentication.</small>
        </div>
        <div class="form-group">
          <label for="model-name">Model</label>
          <input type="text" id="model-name" placeholder="gpt-4o">
          <small class="form-hint">Optional. The model name to use for requests.</small>
        </div>
        <div id="connection-status" class="status-message"></div>
        <div class="form-actions">
          <button type="button" id="reset-settings" class="btn-secondary">Reset Defaults</button>
          <button type="submit" class="btn-primary">Save Settings</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/settings.js"></script>
  <script type="module" src="js/bible.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
